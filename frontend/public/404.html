<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page App</title>
    <script type="text/javascript">
      // Redirect SPA 404s to the root index.html with the path encoded as a query string
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.host +
          "/Earnstrack/?p=" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(0, -1)
            .join("/")
            .replace(/&/g, "~and~") +
          "#" +
          (l.hash.slice(1) ||
            l.pathname
              .slice(1)
              .split("/")
              .slice(-1)
              .join("/")
              .replace(/&/g, "~and~")),
      );
    </script>
  </head>
  <body></body>
</html>
