<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Single Page App</title>
    <script type="text/javascript">
      // Redirect SPA 404s to the root index.html
      // This is the standard GitHub Pages workaround for SPA routing
      (function () {
        var redirect = window.location.pathname;
        if (redirect !== "/Earnstrack/" && redirect !== "/Earnstrack") {
          sessionStorage.redirect = redirect;
        }
        window.location.href = "/Earnstrack/";
      })();
    </script>
  </head>
  <body></body>
</html>
